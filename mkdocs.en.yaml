---
# This file is used to split config and docs navigation
INHERIT: openapi-nav.en.yml

# Project information
site_name: DaoCloud Enterprise OpenAPI
site_url: https://docs.daocloud.io/en/openapi/
site_author: DaoCloud
site_description: >-
  DaoCloud Enterprise 5.0 next-generation cloud native platform documentation and OpenAPI reference.

# copyright
copyright: Copyright &copy; 2016 - 2023 DaoCloud

# Repository
repo_name: DaoCloud/DaoCloud-docs

repo_url: https://github.com/DaoCloud/DaoCloud-docs

exclude_docs: |
  openapi/**

# Configuration
theme:
  name: material

  language: "en"
  features:
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.tabs
    - navigation.prune
    - navigation.sections
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - toc.follow
    - navigation.path

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: images/favicon.ico
  logo: images/DaoCloud.png
  icon:
    logo: logo
    repo: fontawesome/brands/github

# Plugins
plugins:
  - search:
      separator: '[\\s\\u200b\\-]'
  - swagger-ui-tag

  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

  - git-revision-date:
      enabled_if_env: "CI"
  - git-revision-date-localized:
      timezone: Asia/Shanghai
      type: timeago
      fallback_to_build_date: true
      enable_creation_date: true
      exclude:
        - index.md
      enabled: !ENV [ENABLED_GIT_REVISION_DATE, true]

# Customization
extra:
  homepage: /en/

  comments:
    enabled: false
    mode: giscus
    type: Discussions

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: Navigation
      toc_depth: 5
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: daocloud
      repo: daocloud-docs
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.snippets
